<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Organizer</title>
    <link rel="stylesheet" type="text/css"
          href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.13/semantic.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.13/semantic.min.js"></script>
    <script src="./library/common.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="shortcut icon" href="./favicon.ico"/>

</head>
<body>
<div class="ui container">
    <div class="ui secondary menu">
        <a class="item" href="index.html">Home</a>
        <a class="item" href="upload.html">Upload</a>
        <a class="item" href="list.html">List</a>
        <a class="item" href="listDeleted.html">Deleted</a>
        <a class="active item" href="actions.html">Actions</a>
    </div>
    <h3 class="ui header">Actions</h3>
    <p>
        <button class="ui button" id="updateCronofyBtn">Update Cronofy</button>
    </p>
    <div id="cronofyMessage" class="ui hidden message"></div>
</div>

<script>
    document.getElementById('updateCronofyBtn').addEventListener('click', function() {
        var btn = this;
        btn.classList.add('loading');
        btn.disabled = true;
        fetch(getApiBaseUrl("updateCronofy"))
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                btn.classList.remove('loading');
                btn.disabled = false;
                var msgDiv = document.getElementById('cronofyMessage');
                msgDiv.classList.remove('hidden', 'error', 'positive');
                if (data.success) {
                    msgDiv.classList.add('positive');
                    msgDiv.innerHTML = '<div class="header">Success</div><p>' + data.message + '</p>';
                } else {
                    msgDiv.classList.add('error');
                    msgDiv.innerHTML = '<div class="header">Error</div><p>' + data.message + '</p>';
                }
            })
            .catch(function(err) {
                btn.classList.remove('loading');
                btn.disabled = false;
                var msgDiv = document.getElementById('cronofyMessage');
                msgDiv.classList.remove('hidden', 'positive');
                msgDiv.classList.add('error');
                msgDiv.innerHTML = '<div class="header">Error</div><p>Update failed.</p>';
            });
    });
</script>

</body>
</html>
